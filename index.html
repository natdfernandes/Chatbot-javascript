<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <h1>Chatbot com Html e Javascript 🤖</h1>
    <p id="resposta"></p>

    <script>
        function responder() {
            const texto = document.getElementById("mensagem").value.toLowerCase();
            let resposta = "";

            if (texto.includes("oi")) {
                resposta = "Oi! Seja bem-vinda 😊";
            } else if (texto.includes("curso")) {
                resposta = "Sou um chatbot feito para estudos!";
                //Adicionar um else if com a condição texto.includes("ollama")
                //dentro desse if fazer uma requisição  utilizando featch para a api do ollama
                //O modelo vai ser phi3:mini , url vai ser http://localhost:11434/api/generate
                // O prompet vai ser o texxto digitado excluindo a parte do Ollama
                //O corpo da requisição deve conter os atributos model, prompt e stream=false
            } else {
                resposta = "Ainda estou aprendendo 🤖";
            }

            document.getElementById("resposta").innerText = resposta;
        }
    </script>

</body>

</html>
<input id="mensagem" placeholder="Digite sua mensagem" />
<button onclick="responder()">Enviar</button>
